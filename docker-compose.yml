services:
  tradeclaw:
    build: .
    container_name: tradeclaw
    ports:
      - "3000:3000"
      - "8000:8000"
    env_file:
      - backend/.env          # MT5 credentials, API keys, etc.
      - frontend/.env.local
    environment:
      - MT5_BRIDGE_HOST=host.docker.internal   # Connect to MT5 bridge on host
      - MT5_BRIDGE_PORT=18812
    extra_hosts:
      - "host.docker.internal:host-gateway"    # Docker Desktop → host loopback
    volumes:
      - tradeclaw_data:/app/backend/data       # Persistent config, logs
    restart: unless-stopped

volumes:
  tradeclaw_data:
