version: '3.8'

services:
  tradeclaw:
    build: .
    container_name: tradeclaw
    ports:
      - "3000:3000"
      - "8000:8000"
    env_file:
      - backend/.env
      - frontend/.env.local
    volumes:
      - ./tradeclaw_data:/app/backend/data # Ensure database persistence if any local sqlite is used.
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped
